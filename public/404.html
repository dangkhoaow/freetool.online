<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | FreeTool.online</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    // Check for dark mode preference
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    } else if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
    
    // Log for debugging
    console.log('404 page loaded with theme:', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
  </script>
  <style>
    /* Base styles */
    :root {
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --error-color: #ef4444;
      --text-color: #334155;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --header-bg: rgba(255, 255, 255, 0.9);
      --header-text: #0f172a;
      --footer-bg: #0f172a;
      --footer-text: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    
    .dark {
      --primary-color: #3b82f6;
      --primary-hover: #60a5fa;
      --error-color: #f87171;
      --text-color: #e2e8f0;
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --header-bg: rgba(15, 23, 42, 0.9);
      --header-text: #f8fafc;
      --footer-bg: #0f172a;
      --footer-text: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s ease;
    }
    
    /* Header Styles */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background-color: var(--header-bg);
      padding: 1rem 1.5rem;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }
    
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #3b82f6, #22d3ee);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
    }
    
    .nav-links {
      display: none;
    }
    
    @media (min-width: 768px) {
      .nav-links {
        display: flex;
        gap: 2rem;
      }
    }
    
    .nav-link {
      color: var(--header-text);
      text-decoration: none;
      transition: color 0.3s;
    }
    
    .nav-link:hover {
      color: var(--primary-color);
    }
    
    .mobile-menu-btn {
      display: flex;
      align-items: center;
      background: none;
      border: none;
      color: var(--header-text);
      cursor: pointer;
    }
    
    @media (min-width: 768px) {
      .mobile-menu-btn {
        display: none;
      }
    }
    
    /* Hero Section Styles */
    .error-section {
      padding-top: 8rem;
      padding-bottom: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, var(--bg-color), var(--card-bg));
      flex: 1;
    }
    
    .error-container {
      max-width: 550px;
      text-align: center;
      padding: 2rem;
      position: relative;
      margin: auto;
    }
    
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background-color: rgba(59, 130, 246, 0.1);
      color: var(--primary-color);
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }
    
    .error-code {
      font-size: 7rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--primary-color), var(--error-color));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    
    .error-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--error-color);
    }
    
    .error-description {
      margin-bottom: 2rem;
      opacity: 0.8;
      line-height: 1.6;
    }
    
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 250px;
      margin: 0 auto;
    }
    
    @media (min-width: 480px) {
      .buttons {
        flex-direction: row;
        max-width: 100%;
        justify-content: center;
      }
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.375rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background-color: var(--primary-color);
      color: white;
    }
    
    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
    }
    
    .btn-outline {
      background-color: transparent;
      border: 1px solid var(--primary-color);
      color: var(--primary-color);
    }
    
    .btn-outline:hover {
      background-color: var(--primary-color);
      color: white;
      transform: translateY(-2px);
    }
    
    /* Icons */
    .icon {
      display: inline-block;
      width: 24px;
      height: 24px;
      stroke-width: 2;
      stroke: currentColor;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    .icon-sm {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <!-- Header / Navbar -->
  <header>
    <div class="container">
      <div class="navbar">
        <a href="/" class="logo">FreeTool.Online</a>
        
        <nav class="nav-links">
          <a href="/" class="nav-link">Home</a>
          <a href="/tools" class="nav-link">Tools</a>
          <a href="/#features" class="nav-link">Features</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- Error Section (Hero-style) -->
  <section class="error-section">
    <div class="container">
      <div class="error-container">
        <div class="badge">Page Not Found</div>
        
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Oops! We couldn't find that page</h2>
        <p class="error-description">The page you're looking for may have been moved, deleted, or possibly never existed. Don't worry, we have plenty of other helpful tools for you!</p>
        
        <div class="buttons">
          <a href="/" class="btn btn-primary">
            <svg class="icon icon-sm" viewBox="0 0 24 24">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Back to Home
          </a>
          <a href="/tools" class="btn btn-outline">
            <svg class="icon icon-sm" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            Explore Tools
          </a>
        </div>
      </div>
    </div>
  </section>

  <script>
    // Theme toggle functionality
    document.addEventListener('DOMContentLoaded', function() {
      // Log page load for debugging
      console.log('404 page DOM fully loaded');
      
      // Mobile menu toggle
      const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
      const navLinks = document.querySelector('.nav-links');
      
      if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', function() {
          navLinks.style.display = navLinks.style.display === 'flex' ? 'none' : 'flex';
          console.log('Mobile menu toggled');
        });
      }
    });
  </script>
</body>
</html>
