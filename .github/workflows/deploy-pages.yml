name: Deploy freetool.online to GitHub Pages

on:
  push:
    branches:
      - migrate-fe
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Default `/` → assets at `/assets/...` for custom domain + CloudFront at site root.
      # Override in repo Settings → Variables: VITE_BASE_PATH = /freetool.online/ for *.github.io/<repo>/ only.
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
      VITE_API_URL: https://service.freetool.online
      VITE_CONTRACT_MANAGEMENT_API_URL: https://service.freetool.online
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Log Vite public base (debug)
        run: printf 'VITE_BASE_PATH=%s\n' "${VITE_BASE_PATH}"

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
