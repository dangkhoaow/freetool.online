# Minimal fallback configuration that shouldn't conflict with anything
upstream nodejs {
  server 127.0.0.1:8080;
  keepalive 256;
}

server {
  listen 80;
  server_name freetool.online;
  client_max_body_size 500M;
  
  # Enhanced logging for debugging
  error_log /var/log/nginx/error.log debug;
  access_log /var/log/nginx/access.log combined;
  
  # Critical: Direct pass-through of status codes from Next.js
  # This ensures we don't convert 404s to 500s
  proxy_intercept_errors off;
  
  # Handle all JavaScript files with proper content type
  location ~ \.js$ {
    proxy_pass http://nodejs;
    add_header Content-Type "application/javascript" always;
    add_header X-Debug-Path $request_uri always;
  }
  
  # Handle all CSS files with proper content type
  location ~ \.css$ {
    proxy_pass http://nodejs;
    add_header Content-Type "text/css" always;
    add_header X-Debug-Path $request_uri always;
  }
  
  # Main location - handle all other requests
  location / {
    proxy_pass http://nodejs;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # For proper error handling
    proxy_intercept_errors off;
    
    # Add debug headers
    add_header X-Debug-Path $request_uri always;
  }
}
