# Absolute minimal emergency configuration for when all else fails
# This is only used if both custom.conf and custom-fallback.conf have issues

upstream nodejs {
  server 127.0.0.1:8080;
  keepalive 256;
}

server {
  listen 80;
  server_name freetool.online;
  client_max_body_size 500M;
  
  location / {
    proxy_pass http://nodejs;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
  
  # Emergency JavaScript handler
  location ~ \.js$ {
    proxy_pass http://nodejs;
    add_header Content-Type "application/javascript" always;
  }
  
  # Emergency CSS handler
  location ~ \.css$ {
    proxy_pass http://nodejs;
    add_header Content-Type "text/css" always;
  }
} 