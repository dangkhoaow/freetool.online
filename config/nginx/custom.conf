upstream nodejs {
  server 127.0.0.1:8080;
  keepalive 256;
}

# HTTP server
server {
  listen 80;
  server_name freetool.online;
  
  # Increase max file upload size to 500MB
  client_max_body_size 500M;
  
  # Enable gzip compression for better performance
  gzip on;
  gzip_comp_level 4;
  gzip_min_length 1000;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  
  # Proper MIME type handling
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  
  # Set cache control headers for static assets
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    # Proxy to the Next.js server
    proxy_pass http://nodejs;
    
    # Use named location for headers
    try_files "" @next_headers;
    
    # Standard proxy headers
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Add cache headers directly for static assets
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable" always;
    add_header X-Content-Type-Options nosniff always;
    
    # Manually set content type for JavaScript and CSS files
    if ($request_filename ~* \.js$) {
      add_header Content-Type "application/javascript" always;
    }
    
    if ($request_filename ~* \.css$) {
      add_header Content-Type "text/css" always;
    }
  }
  
  # Explicitly handle Next.js JS chunks with correct mime type
  location ~* /_next/static/chunks/.*\.js$ {
    proxy_pass http://nodejs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Explicitly set Content-Type for JavaScript
    add_header Content-Type "application/javascript" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options nosniff always;
  }
  
  # Avoid caching _next/data/ requests too long (Next.js data fetching)
  location ~* /_next/data/ {
    proxy_pass http://nodejs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=30";
  }
  
  # Main location block for all other requests
  location / {
    proxy_pass http://nodejs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Increase proxy timeout for larger file uploads
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    
    # Add header to prevent content type sniffing
    add_header X-Content-Type-Options nosniff always;
  }
}
