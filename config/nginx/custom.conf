upstream nodejs {
  server 127.0.0.1:8080;
  keepalive 256;
}

# HTTP server
server {
  listen 80;
  server_name freetool.online;
  
  # Enhance logging for debugging
  error_log /var/log/nginx/error.log debug;
  access_log /var/log/nginx/access.log combined;
  
  # Increase max file upload size to 500MB
  client_max_body_size 500M;
  
  # Enable gzip compression for better performance
  gzip on;
  gzip_comp_level 4;
  gzip_min_length 1000;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  
  # Proper MIME type handling
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  
  # Critical: Direct pass-through of status codes from Next.js
  # This ensures we don't convert 404s to 500s
  proxy_intercept_errors off;
  
  # Log 404 errors for debugging
  log_format missing_log '[$time_local] "$request" - Missing resource';
  access_log /var/log/nginx/404_errors.log missing_log if=$status = 404;
  
  # CRITICAL: Explicit handling for key application routes
  # This ensures application routes are never treated as static files
  location = /private-ai-chat {
    proxy_pass http://nodejs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 120s;
    
    # Add debugging headers
    add_header X-Route-Type "AppRoute" always;
    add_header X-Content-Type-Debug "text/html; charset=utf-8" always;
  }
  
  # Main location block for application routes - MUST COME BEFORE STATIC ASSETS
  location / {
    proxy_pass http://nodejs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 120s;
    
    # Add debug headers
    add_header X-Debug-Path $request_uri always;
  }
  
  # Explicitly handle Next.js JS chunks with correct mime type
  location ~* /_next/static/chunks/.*\.js$ {
    proxy_pass http://nodejs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Explicitly set Content-Type for JavaScript
    add_header Content-Type "application/javascript" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options nosniff always;
  }
  
  # Avoid caching _next/data/ requests too long (Next.js data fetching)
  location ~* /_next/data/ {
    proxy_pass http://nodejs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=30";
  }
  
  # Static asset handling - COMES AFTER APPLICATION ROUTES
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    # Proxy to the Next.js server
    proxy_pass http://nodejs;
    
    # Standard proxy headers
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Add debug headers
    add_header X-Debug-Path $request_uri always;
    add_header X-Route-Type "StaticFile" always;
    
    # Add cache headers directly for static assets
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable" always;
    add_header X-Content-Type-Options nosniff always;
    
    # Manually set content type for JavaScript and CSS files
    if ($request_filename ~* \.js$) {
      add_header Content-Type "application/javascript" always;
    }
    
    if ($request_filename ~* \.css$) {
      add_header Content-Type "text/css" always;
    }
  }
  
  # Add location for 404 page
  location = /404.html {
    proxy_pass http://nodejs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Add debug headers
    add_header X-Route-Type "404-Page" always;
  }
  
  # Handle 404 errors directly with Nginx for page routes
  location = /not-found {
    # Pass to the Next.js not-found page
    proxy_pass http://nodejs/not-found;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # Important: Set the response status code to 404
    add_header Status "404 Not Found";
    
    # Debug headers
    add_header X-Handled-By "Nginx-NotFound" always;
  }
  
  # Custom error handling for 404 errors
  error_page 404 =404 /not-found;
}
