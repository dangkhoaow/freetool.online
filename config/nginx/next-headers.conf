# Force proper content types for Next.js files

# Explicitly set content types for various file extensions
map $uri $content_type_by_extension {
  "~\.js$"           "application/javascript";
  "~\.mjs$"          "application/javascript";
  "~\.css$"          "text/css";
  "~\.json$"         "application/json";
  default           "";
}

# Override content type if needed
map $sent_http_content_type $fixed_content_type {
  "~text/plain.*js"       "application/javascript";
  "~text/html.*js"        "application/javascript";
  "~application/octet-stream.*js" "application/javascript";
  default                  $sent_http_content_type;
}

# Instead of using global add_header directives (which can cause issues),
# these headers will be included by reference in the main configuration
# The proper way would be to include this in location blocks in custom.conf

# Example usage in custom.conf location blocks:
# include conf.d/next-headers-include.conf;

# Define a named location that can be reused
location @next_headers {
  add_header Content-Type $fixed_content_type always;
  add_header X-Content-Type-Override $fixed_content_type always;
  add_header CF-Cache-Control "max-age=31536000, public, immutable" always;
  add_header Vary "Accept-Encoding, Origin" always;
}
