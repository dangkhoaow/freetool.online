server {
    listen 80;
    server_name $LS_IP;

    # Logging
    error_log /var/log/nginx/freetool-error.log;
    access_log /var/log/nginx/freetool-access.log;

    # Set large client body size to allow uploads
    client_max_body_size 100M;

    # Main location block
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Set higher timeouts for file uploads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Next.js static files
    location /_next/static {
        proxy_pass http://localhost:3000/_next/static;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # Explicit handling for JavaScript files
    location ~* \.js$ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        add_header Content-Type application/javascript;
        add_header X-Content-Type-Options nosniff;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static files
    location /static {
        proxy_pass http://localhost:3000/static;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
} 